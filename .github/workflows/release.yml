name: Release

# Triggered only by pushing a tag like v0.1.0 / v1.2.3. Plain commits do
# not publish. Create a tag that matches cli/package.json (for example
# v0.1.3). `npm version <patch|minor|major>` inside cli/ can bump and tag in
# one step when the working tree is clean.
on:
  push:
    tags:
      - "v*.*.*"

# id-token is required for npm trusted publishing (OIDC). The npm package must
# trust this repository + workflow filename in npmjs package settings.
# contents:read is the default; making it explicit for clarity.
permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify CLI package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Verify PowerShell Core on Linux
        if: runner.os == 'Linux'
        run: pwsh --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Smoke install test
        run: npm test

  publish:
    name: Publish CLI to npm
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + npmjs registry
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: cli/package-lock.json

      # Fail fast if someone tagged vX.Y.Z but forgot to bump
      # cli/package.json (or vice versa). npm version handles this for
      # you when run inside cli/, but a hand-pushed tag can drift.
      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            Write-Error "tag $tag does not match package.json version $pkg"
            exit 1
          }
          Write-Host "tag $tag matches package.json version"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Smoke install test
        run: npm test

      # Trusted publishing uses GitHub's OIDC token; no NPM_TOKEN secret is
      # needed. npm generates provenance automatically for public packages.
      - name: Publish to npm
        run: npm publish --access public
