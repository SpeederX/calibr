name: tests

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run unit + integration tests
        shell: pwsh
        run: |
          ./tests/run-tests.ps1
        # The custom harness exits non-zero on any failed assertion, which
        # bubbles up here. No external dependencies (no Pester install).

  syntax-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse calibr.ps1
        shell: pwsh
        run: |
          $errs = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/calibr.ps1", [ref]$null, [ref]$errs
          ) | Out-Null
          if ($errs) {
            $errs | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "OK"
